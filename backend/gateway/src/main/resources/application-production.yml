server:
  port: ${PORT:8080}

spring:
  application:
    name: gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: 10000
        response-timeout: 30s
      routes:
        # User Service
        - id: user-service
          uri: http://user-service:${USER_SERVICE_PORT:8080}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0
          metadata:
            connect-timeout: 10000
            response-timeout: 30000
        
        # Audition Service - Auditions
        - id: audition-service-auditions
          uri: http://audition-service:${AUDITION_SERVICE_PORT:8080}
          predicates:
            - Path=/api/v1/auditions,/api/v1/auditions/**
          filters:
            - StripPrefix=0
        
        # Audition Service - Applications
        - id: audition-service-applications
          uri: http://audition-service:${AUDITION_SERVICE_PORT:8080}
          predicates:
            - Path=/api/v1/applications,/api/v1/applications/**
          filters:
            - StripPrefix=0
        
        # Audition Service - Offers
        - id: audition-service-offers
          uri: http://audition-service:${AUDITION_SERVICE_PORT:8080}
          predicates:
            - Path=/api/v1/offers,/api/v1/offers/**
          filters:
            - StripPrefix=0
        
        # Media Service
        - id: media-service
          uri: http://media-service:${MEDIA_SERVICE_PORT:8080}
          predicates:
            - Path=/api/v1/videos/**
          filters:
            - StripPrefix=0

management:
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      enabled: true
    gateway:
      enabled: true

logging:
  level:
    root: INFO
    com.audition.platform: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty.http.client: DEBUG
    io.netty: DEBUG
    org.springframework.http.server.reactive: DEBUG
