server:
  port: ${PORT:8080}

spring:
  application:
    name: gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: 10000  # 10мҙ??°кІ° ?Җ?„м•„??        response-timeout: 30s   # 30мҙ??‘лӢө ?Җ?„м•„??      routes:
        # User Service
        # Railway ?ҳкІҪ ліҖ?ҳм—җ???Өм •: USER_SERVICE_URL=https://user-service-production-7ba1.up.railway.app
        - id: user-service
          uri: http://user-service:${USER_SERVICE_PORT:8082}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0
          metadata:
            connect-timeout: 10000
            response-timeout: 30000
        
        # Audition Service
        # Railway ?ҳкІҪ ліҖ?ҳм—җ???Өм •: AUDITION_SERVICE_URL=https://audition-service-production.up.railway.app
        - id: audition-service
          uri: http://audition-service:${AUDITION_SERVICE_PORT:8081}
          predicates:
            - Path=/api/v1/auditions/**
            - Path=/api/v1/applications/**
            - Path=/api/v1/offers/**
          filters:
            - StripPrefix=0
        
        # Media Service
        # Railway ?ҳкІҪ ліҖ?ҳм—җ???Өм •: MEDIA_SERVICE_URL=https://media-service-production-dff0.up.railway.app
        - id: media-service
          uri: http://media-service:${MEDIA_SERVICE_PORT:8083}
          predicates:
            - Path=/api/v1/videos/**
          filters:
            - StripPrefix=0
      
      # CORS ?Өм •?Җ CorsConfig.java?җм„ң мІҳлҰ¬ (globalcors ?Өм • ?ңкұ° - allowCredentials?Җ allowedOrigins "*" м¶©лҸҢ ?ҙкІ°)

management:
  endpoints:
    web:
      exposure:
        include: "*"  # лӘЁл“  ?”л“ң?¬мқё???ём¶ң (gateway routes ?¬н•Ё)
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      enabled: true
    gateway:
      enabled: true  # Gateway Actuator ?”л“ң?¬мқё???ңм„ұ??
logging:
  level:
    root: INFO
    com.audition.platform: INFO
    org.springframework.cloud.gateway: DEBUG  # Gateway ?јмҡ°???”лІ„к№?    org.springframework.web.reactive: DEBUG   # WebFlux ?җлҹ¬ ?”лІ„к№?    reactor.netty.http.client: DEBUG          # Netty HTTP ?ҙлқј?ҙм–ё???”лІ„к№?    io.netty: DEBUG                           # Netty ?Ғм„ё ?”лІ„к№?    org.springframework.http.server.reactive: DEBUG  # Reactive HTTP ?ңлІ„ ?”лІ„к№
