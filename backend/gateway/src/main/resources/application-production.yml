server:
  port: ${PORT:8080}

spring:
  application:
    name: gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: 10000  # 10зҸҘ??кіҢк»җ ?ВҖ?кҫ©лёҳ??        response-timeout: 30s   # 30зҸҘ??л¬җл–ҹ ?ВҖ?кҫ©лёҳ??      routes:
        # User Service
        # Railway ?м„ҚкјҚ и№ӮВҖ?м„Ҹлҝү???г…јм ҷ: USER_SERVICE_URL=https://user-service-production-7ba1.up.railway.app
        - id: user-service
          uri: http://user-service:${USER_SERVICE_PORT}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0
          metadata:
            connect-timeout: 10000
            response-timeout: 30000
        
        # Audition Service
        # Railway ?м„ҚкјҚ и№ӮВҖ?м„Ҹлҝү???г…јм ҷ: AUDITION_SERVICE_URL=https://audition-service-production.up.railway.app
        - id: audition-service
          uri: http://audition-service:${AUDITION_SERVICE_PORT}
          predicates:
            - Path=/api/v1/auditions/**
            - Path=/api/v1/applications/**
            - Path=/api/v1/offers/**
          filters:
            - StripPrefix=0
        
        # Media Service
        # Railway ?м„ҚкјҚ и№ӮВҖ?м„Ҹлҝү???г…јм ҷ: MEDIA_SERVICE_URL=https://media-service-production-dff0.up.railway.app
        - id: media-service
          uri: http://media-service:${MEDIA_SERVICE_PORT}
          predicates:
            - Path=/api/v1/videos/**
          filters:
            - StripPrefix=0
      
      # CORS ?г…јм ҷ?ВҖ CorsConfig.java?лЁҜкҪҢ п§Јм„Һв”Ғ (globalcors ?г…јм ҷ ?м’“кө… - allowCredentials?ВҖ allowedOrigins "*" з•°в‘ёлЈҺ ?лӢҝк»җ)

management:
  endpoints:
    web:
      exposure:
        include: "*"  # п§Ҹв‘Өлұә ?л¶ҫлұ¶?СҠм”Ө???лӘ„н…§ (gateway routes ?СӢлёҝ)
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      enabled: true
    gateway:
      enabled: true  # Gateway Actuator ?л¶ҫлұ¶?СҠм”Ө???м’–кҪҰ??
logging:
  level:
    root: INFO
    com.audition.platform: INFO
    org.springframework.cloud.gateway: DEBUG  # Gateway ?мҮұмҠҰ???л¶ҫмҫӯжәҗ?    org.springframework.web.reactive: DEBUG   # WebFlux ?лЁ®мңӯ ?л¶ҫмҫӯжәҗ?    reactor.netty.http.client: DEBUG          # Netty HTTP ?лҢҖм”Ә?лҢҒлјө???л¶ҫмҫӯжәҗ?    io.netty: DEBUG                           # Netty ?кіёкҪӯ ?л¶ҫмҫӯжәҗ?    org.springframework.http.server.reactive: DEBUG  # Reactive HTTP ?м’•мҫӯ ?л¶ҫмҫӯжәҗ
