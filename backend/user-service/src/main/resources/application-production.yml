spring:
  application:
    name: user-service
  
  # Railway PostgreSQL Public URL 사용
  # Railway PostgreSQL 서비스 → Variables에서 DATABASE_PUBLIC_URL 복사
  # URL에 username/password가 포함된 경우: 그대로 사용 가능
  # URL만 사용하려면: jdbc:postgresql://metro.proxy.rlwy.net:55360/railway
  # Railway → user-service → Variables 설정 (두 가지 방법 중 선택):
  # 방법 1: URL에 인증 정보 포함 → username/password 설정 불필요
  #   DATABASE_PUBLIC_URL = jdbc:postgresql://postgres:비밀번호@metro.proxy.rlwy.net:55360/railway
  # 방법 2: URL과 인증 정보 분리 (권장)
  #   DATABASE_PUBLIC_URL = jdbc:postgresql://metro.proxy.rlwy.net:55360/railway
  #   SPRING_DATASOURCE_USERNAME = postgres
  #   SPRING_DATASOURCE_PASSWORD = 실제비밀번호
  datasource:
    url: ${DATABASE_PUBLIC_URL}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  address: 0.0.0.0
  port: ${PORT}

jwt:
  secret: ${JWT_SECRET:your-secret-key-should-be-at-least-256-bits-long-for-hs256-algorithm-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: "*"  # 모든 엔드포인트 노출 (프로덕션에서는 health만 권장)
      base-path: /actuator  # 명시적으로 base-path 설정
  endpoint:
    health:
      show-details: always
      enabled: true
      probes:
        enabled: true
  health:
    enabled: true

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
