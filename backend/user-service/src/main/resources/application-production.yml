spring:
  application:
    name: user-service
  
  # Railway PostgreSQL Public URL 사용
  # Railway PostgreSQL 서비스 → Variables에서 DATABASE_PUBLIC_URL 복사 (JDBC 형식으로 변환 필요)
  # 예: jdbc:postgresql://metro.proxy.rlwy.net:55360/railway
  # Railway → user-service → Variables 설정:
  # DATABASE_PUBLIC_URL = jdbc:postgresql://metro.proxy.rlwy.net:55360/railway
  # SPRING_DATASOURCE_USERNAME = postgres
  # SPRING_DATASOURCE_PASSWORD = 실제비밀번호
  datasource:
    url: ${DATABASE_PUBLIC_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  address: 0.0.0.0
  port: ${PORT}

jwt:
  secret: ${JWT_SECRET:your-secret-key-should-be-at-least-256-bits-long-for-hs256-algorithm-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: "*"  # 모든 엔드포인트 노출 (프로덕션에서는 health만 권장)
      base-path: /actuator  # 명시적으로 base-path 설정
  endpoint:
    health:
      show-details: always
      enabled: true
      probes:
        enabled: true
  health:
    enabled: true

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
