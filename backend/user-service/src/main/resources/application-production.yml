spring:
  application:
    name: user-service
  
  # Railway 환경 변수에서 직접 사용
  # Railway 대시보드에서 다음 변수를 설정하세요:
  # SPRING_DATASOURCE_URL=jdbc:postgresql://postgres.railway.internal:5432/railway
  # SPRING_DATASOURCE_USERNAME=postgres
  # SPRING_DATASOURCE_PASSWORD=실제비밀번호
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  address: 0.0.0.0
  port: ${PORT}

jwt:
  secret: ${JWT_SECRET:your-secret-key-should-be-at-least-256-bits-long-for-hs256-algorithm-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: "*"  # 모든 엔드포인트 노출 (프로덕션에서는 health만 권장)
      base-path: /actuator  # 명시적으로 base-path 설정
  endpoint:
    health:
      show-details: always
      enabled: true
      probes:
        enabled: true
  health:
    enabled: true

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
