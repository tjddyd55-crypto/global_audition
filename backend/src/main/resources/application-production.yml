# Production profile — do NOT set ddl-auto; Flyway is SSOT.
app:
  cors:
    allowed-origins:
      - https://frontend-production-8613a.up.railway.app

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:audition}?currentSchema=public}
    username: ${SPRING_DATASOURCE_USERNAME:${PGUSER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
    hikari:
      schema: public
      connection-init-sql: SET search_path TO public
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        hbm2ddl:
          auto: none
  flyway:
    enabled: true
    schemas: public
    default-schema: public
    create-schemas: true
    init-sqls: SET search_path TO public
    repair-on-migrate: true