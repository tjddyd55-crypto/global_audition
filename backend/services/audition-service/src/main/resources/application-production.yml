spring:
  application:
    name: audition-service
  
  # 프로덕션: postgres-main (통합 DB)
  datasource:
    url: ${DATABASE_PUBLIC_URL:jdbc:postgresql://postgres-main:5432/railway}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: none  # Flyway가 스키마 관리하므로 Hibernate 검증 비활성화
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: false  # 체크섬 검증 비활성화 (이미 적용된 마이그레이션과 충돌 방지)
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  
  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 2048MB

server:
  address: 0.0.0.0
  port: ${PORT}

# 서버 기준선(SSOT): api-backend는 gateway + user-domain + audition-domain이 하나의 배포 단위
# localhost/포트 기반 통신 금지
# api-backend 내부는 직접 서비스 주입 사용 (HTTP 호출 불필요)
# user.service.url 설정 제거 (직접 서비스 주입 사용)

jwt:
  secret: ${JWT_SECRET:your-secret-key-should-be-at-least-256-bits-long-for-hs256-algorithm-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator  # 명시적으로 base-path 설정
  endpoint:
    health:
      show-details: always
      enabled: true
      probes:
        enabled: true
  health:
    redis:
      enabled: false  # Redis Health Indicator 비활성화 (Redis가 없어도 Health Check 통과)

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
