spring:
  application:
    name: user-service
  
  # 프로덕션: postgres-main (통합 DB)
  datasource:
    url: ${DATABASE_PUBLIC_URL:jdbc:postgresql://postgres-main:5432/railway}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  address: 0.0.0.0
  port: ${PORT}

# 프로덕션: api-backend (gateway + user + audition 통합)
# 내부 API는 같은 서버 내부에서 호출됨

jwt:
  secret: ${JWT_SECRET:your-secret-key-should-be-at-least-256-bits-long-for-hs256-algorithm-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: "*"  # 모든 엔드포인트 노출 (프로덕션에서는 health만 권장)
      base-path: /actuator  # 명시적으로 base-path 설정
  endpoint:
    health:
      show-details: always
      enabled: true
      probes:
        enabled: true
  health:
    enabled: true

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
