spring:
  application:
    name: media-service
  
  # Flyway: Checksum Mismatch(V2,V3,V5,V6) 및 누락(V4) 해결용
  # - repair-on-migrate: true → DB의 체크섬을 현재 코드 기준으로 강제 동기화
  # - out-of-order: true   → 누락된 V4가 중간에 실행되도록 허용
  # [메모] 배포가 성공하고 flyway_schema_history가 안정화되면 repair-on-migrate를 제거할 수 있음 (보안·감사상 권장)
  flyway:
    repair-on-migrate: true
    out-of-order: true
  
  # 프로덕션: Railway 내부 DB만 사용 (public proxy 아님)
  # Railway가 SPRING_DATASOURCE_URL로 내부 주소 주입 (예: postgres.railway.internal:5432/railway)
  # ddl-auto는 application.yml SSOT. Railway Variables에 SPRING_JPA_HIBERNATE_DDL_AUTO 설정 금지.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-main:5432/railway}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8083}

jwt:
  secret: ${JWT_SECRET:your-secret-key-should-be-at-least-256-bits-long-for-hs256-algorithm-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.audition.platform: INFO
